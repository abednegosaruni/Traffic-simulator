<!DOCTYPE html>
<html lang="en">
<head>
    <title>Traffic Simulator</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <h1>Traffic Simulator</h1>
    <p>Welcome to the Traffic Simulator! This application allows you to simulate traffic flow and analyze various traffic scenarios. Use the controls below to start the simulation and adjust settings as needed.</p>
   
    <!-- Simulation visualization will be rendered here -->
    <div class="simulation-area">
       <div class="traffic-lights">
            <div class="light red"></div>
            <div class="light yellow"></div>
            <div class="light green"></div>
       </div>
       <div class="car"></div> 
    </div>
   <script src="script.js"></script>
</body>
</html>
